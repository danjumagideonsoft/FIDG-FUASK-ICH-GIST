<!DOCTYPE html>
<html>
<head>
    <title>FIDG Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>FIDG</h1>
    <p>FUASK Industrial Chemistry Department Gist</p>
</header>

<section class="hero">

    <h2>Student Registration</h2>

    <p>
        Register to join the private FIDG community.
        Only verified FUASK Industrial Chemistry students are allowed.
    </p>

    <form id="registerForm">

        <label>Email Address</label><br>
<input id="email" type="email" placeholder="Enter email address" required>

<br><br>

<label>Password</label><br>
<input id="password" type="password" placeholder="Create password" required>

        <label>Matric Number</label><br>
        <input type="text" placeholder="Enter your matric number" required>
        <br><br>

        <label>Level</label><br>
        <select id="level" required>
            <option>100 Level</option>
            <option>200 Level</option>
            <option>300 Level</option>
            <option>400 Level</option>
        </select>
        <br><br>

        <label>Department</label><br>
        <input type="text" value="Industrial Chemistry (ICH)" readonly>
        <br><br>

        <label>Email Address</label><br>
        <input type="email" placeholder="Enter email address" required>
        <br><br>

        <label>Phone Number</label><br>
        <input type="tel" placeholder="Enter phone number" required>
        <br><br>

        <label>Admission Number</label><br>
<input id="admission" type="text" placeholder="Enter your admission number" required>

        <button type="submit">Submit Registration</button>
    </form>

</section>

<footer>
    <p>© 2026 FIDG - FUASK ICH Department</p>
</footer>
    
<script type="module" src="auth.js"></script>
<script type="module" src="database.js"></script>    

</body>
              </html>
